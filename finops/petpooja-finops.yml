provider: Petpooja
providerId: petpooja
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Restaurant
- POS
- Online Ordering
- Menu
- Food Delivery
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Petpooja spend. Petpooja is billed as a sales-led, per-outlet
  subscription to its restaurant POS and management platform, with optional
  add-on modules and integrations quoted by sales. The Online Ordering API is an
  integration capability of the platform rather than a separately metered,
  pay-per-call product with public rates. There is no published usage-based API
  price list, so cost meters below describe the dimensions to track for
  allocation rather than reconciled unit prices.
notes: >-
  Per-outlet subscription and add-on prices are quoted by Petpooja sales and are
  not publicly posted. Reconcile against an actual quote/invoice; treat API usage
  as part of the platform subscription unless a partner agreement states otherwise.
sources:
- https://www.petpooja.com
- https://www.petpooja.com/poss
- https://onlineorderingapisv210.docs.apiary.io/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Petpooja
serviceCategory: Business Application Software
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: INR
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Petpooja POS
  ServiceCategory: Business Application Software
  ProviderName: Petpooja
  PublisherName: Petpooja
  InvoiceIssuerName: Petpooja
  BillingCurrency: INR
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: outlet_subscription
  description: Per-outlet POS subscription seats under the Petpooja agreement.
  unit: outlets
  aggregation: sum
  dimensions:
  - account
  - outlet
- name: addon_modules
  description: Optional add-on modules / integrations enabled per outlet.
  unit: modules
  aggregation: sum
  dimensions:
  - account
  - outlet
  - module
- name: api_integrations
  description: Active Online Ordering API integrations (partner credentials) per restaurant.
  unit: integrations
  aggregation: sum
  dimensions:
  - account
  - restaurant
- name: orders_pushed
  description: Online orders pushed into the POS via save_order; track for operational allocation.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - restaurant
principles:
- name: Visibility
  description: Track per-outlet subscription and enabled add-ons against the Petpooja agreement and invoices.
- name: Allocation
  description: Map outlets, API integrations, and order volume to the responsible brand or franchise cost center.
- name: Optimization
  description: Enable only the add-on modules and integrations each outlet needs; consolidate partner integrations.
- name: Accountability
  description: Assign an owner per outlet/agreement and review subscription and add-on spend each renewal cycle.
maintainers:
