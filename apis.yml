    type: OpenAPI
  - url: collections/petpooja.postman_collection.json
    type: PostmanCollection
  - url: collections/petpooja.opencollection.json
    type: OpenCollection
  description: Fetch a mapped restaurant's full menu (categories, items, variations,
    add-on groups, attributes, taxes, discounts) from Petpooja, and receive Petpooja's
    Push Menu callback when a restaurant updates its catalog. Authenticated with
    app-key, app-secret, and access-token; scoped by restID.
- aid: petpooja:orders-api
