aid: petpooja
url: https://raw.githubusercontent.com/api-evangelist/petpooja/refs/heads/main/apis.yml
name: Petpooja
kind: company
description: Petpooja is a restaurant point-of-sale (POS) and management platform serving
  75,000+ restaurants across India, the Middle East, Canada, and South Africa. Its
  Online Ordering API lets aggregators and partner ordering platforms sync a restaurant's
  menu/catalog, push orders into the Petpooja POS, receive order-status callbacks,
  and toggle item stock and store availability.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Restaurant
- POS
- Online Ordering
- Menu
- Food Delivery
