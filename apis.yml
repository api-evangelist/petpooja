    type: OpenAPI
  - url: collections/petpooja.postman_collection.json
    type: PostmanCollection
  - url: collections/petpooja.opencollection.json
    type: OpenCollection
  description: Push a new online order (customer, order, order items, taxes, discounts,
    delivery and packing charges, payment type, prep time, OTP) into the Petpooja
    POS via save_order. Authenticated with app_key, app_secret, and access_token in
    the request body.
